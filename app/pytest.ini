[pytest]
markers =
    core: tests for core infrastructure (caching, rate limiting, audit, backup)
    analytics: tests for analytics endpoints
    api_docs: tests for API documentation
DJANGO_SETTINGS_MODULE = tests.test_settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Tests
python_functions = test_*
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --reuse-db
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security tests
    slow: Slow running tests
    api: API endpoint tests
    model: Model tests
    bulk: Bulk operations tests
    validation: Content validation tests
    analytics: Analytics dashboard tests
    api_docs: API documentation tests
