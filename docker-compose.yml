services:
  db:
    image: postgres:15-alpine
    container_name: db  # Matches DB_HOST env var
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-pixelcast_signage_db}
      - POSTGRES_USER=${DB_USER:-pixelcast_signage_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pixelcast_signage_user} -d ${DB_NAME:-pixelcast_signage_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - pixelcast-signage-net
    # Security: Don't expose ports to host in production
    # ports:
    #   - "${DB_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    container_name: redis  # Matches REDIS_HOST env var
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - pixelcast-signage-net
    # Security: Don't expose ports to host in production
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: backend  # MUST match Nginx upstream name
    command: /app/entrypoint.sh
    volumes:
      # Isolated from ./BackEnd:/app (dev) to avoid VirtioFS mount overlap — wizard writes persist to host ./.env
      - ./.env:/config/.env
      # Mount installation state directory - MUST be a directory (Docker volumes cannot be files)
      # The lock file is created at /app/installation_state/installed.lock
      - installation_state:/app/installation_state
      # Static files (collected by Django) - persists across container restarts
      - backend_static:/app/staticfiles
      # User-uploaded media content - CRITICAL: Must persist across updates
      - backend_media:/app/media
      # Backups - persists across container restarts
      - backend_backups:/app/backups
    environment:
      # Canonical .env path inside the container (see BackEnd/setup/paths.py)
      - PIXELCAST_SIGNAGE_ENV_FILE=/config/.env
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,frontend}
      - INSTALLATION_STATE_DIR=/app/installation_state
      - DB_NAME=${DB_NAME:-pixelcast_signage_db}
      - DB_USER=${DB_USER:-pixelcast_signage_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - USE_SQLITE=${USE_SQLITE:-False}
      - BASE_URL=${BASE_URL:-http://localhost}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - USE_REDIS_CACHE=${USE_REDIS_CACHE:-True}
      - REDIS_CACHE_URL=${REDIS_CACHE_URL:-redis://redis:6379/1}
      - CHANNEL_LAYERS_BACKEND=${CHANNEL_LAYERS_BACKEND:-redis}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      # Health check that works both before and after installation
      test: ["CMD", "python", "-c", "import urllib.request; import sys; response = urllib.request.urlopen('http://localhost:8000/api/setup/status/', timeout=5); sys.exit(0 if response.getcode() in [200, 503] else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Increased to allow migrations to complete
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - pixelcast-signage-net
    # Backend is not exposed to host - only accessible via frontend proxy

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
      # Uncomment for HTTPS
      # - "${FRONTEND_HTTPS_PORT:-443}:443"
    depends_on:
      backend:
        condition: service_started  # Don't wait for healthy - Nginx handles unavailable backend gracefully
    restart: always
    networks:
      - pixelcast-signage-net
    # Health check for frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Development frontend with Hot Reload (HMR)
  # Run: docker compose up db redis backend frontend-dev
  # Open: http://localhost:5173
  frontend-dev:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./FrontEnd:/app
      - /app/node_modules  # Crucial: prevent local node_modules from overwriting container's
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    networks:
      - pixelcast-signage-net

volumes:
  # Database data - CRITICAL: Must persist across updates
  postgres_data:
    driver: local
    name: pixelcast-signage_postgres_data
  # Redis data - persists cache and session data
  redis_data:
    driver: local
    name: pixelcast-signage_redis_data
  # Static files - collected by Django, persists across container restarts
  backend_static:
    driver: local
    name: pixelcast-signage_backend_static
  # Media uploads - CRITICAL: User-uploaded content must persist
  backend_media:
    driver: local
    name: pixelcast-signage_backend_media
  # Backups - persists backup files
  backend_backups:
    driver: local
    name: pixelcast-signage_backend_backups
  # Installation state - ensures installation wizard doesn't re-trigger on updates
  installation_state:
    driver: local
    name: pixelcast-signage_installation_state

networks:
  pixelcast-signage-net:
    driver: bridge
    name: pixelcast-signage-net
