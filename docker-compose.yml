services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      - POSTGRES_DB=${DB_NAME:-pixelcast_signage_db}
      - POSTGRES_USER=${DB_USER:-pixelcast_signage_user}
      # Non-empty default prevents Postgres boot failure when .env is missing.
      - POSTGRES_PASSWORD=${DB_PASSWORD:-tqaG32AWqO}
      # Use an internal subdirectory to avoid initdb failure when mount root contains artifacts.
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pixelcast_signage_user} -d ${DB_NAME:-pixelcast_signage_db}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: always

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: backend
    command: sh /app/entrypoint.sh
    environment:
      - PIXELCAST_SIGNAGE_ENV_FILE=/config/.env
      # Keep backend bootable in first-run setups without .env.
      - SECRET_KEY=${SECRET_KEY:-wN9vQx2!mK7pR4tY8uH3cD6sL1zA5eB9fG2jT7nV4qP8xM3rK6hC1wZ}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,frontend}
      - DB_NAME=${DB_NAME:-pixelcast_signage_db}
      - DB_USER=${DB_USER:-pixelcast_signage_user}
      - DB_PASSWORD=${DB_PASSWORD:-tqaG32AWqO}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USE_REDIS_CACHE=${USE_REDIS_CACHE:-True}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - ENABLE_HOT_RELOAD=${ENABLE_HOT_RELOAD:-true}
    volumes:
      - ./.env:/config/.env
      - ./app:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    command:
      - sh
      - /app/docker-entrypoint-dev.sh
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
      - --port
      - "5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=/api
      - VITE_IOT_BASE_URL=/iot
      - VITE_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - ./documentation:/app/public/documentation:ro
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started
    # Host port → container 5173. Use FRONTEND_HOST_PORT (not FRONTEND_PORT) so platforms
    # that inject FRONTEND_PORT=80 for unrelated reasons do not steal host :80 from Traefik.
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    restart: always

volumes:
  postgres_data:
  redis_data:
  backend_media:
  backend_static:
