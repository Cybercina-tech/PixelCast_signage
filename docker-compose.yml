version: '3.8'

services:
  db:
    image: postgres:15
    container_name: screengram_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=screengram_db
      - POSTGRES_USER=screengram_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-B9HzZGvPwtQOwA2_Dj_sUXH7g4kUtqmJloaGvz5ezR4}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screengram_user -d screengram_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: