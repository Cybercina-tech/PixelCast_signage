# Overlay: e.g. `docker compose -f docker-compose.yml -f docker-compose.dev.yml up`
# Uses same `.env` as base stack (DB_PASSWORD default safpewri234aca).
services:
  backend:
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
