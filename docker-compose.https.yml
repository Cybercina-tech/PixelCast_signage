# Optional overlay: Vite HMR over WSS (fixes Mixed Content when the app is served at https://…).
# Local http://localhost:5173 → keep VITE_BEHIND_HTTPS_PROXY=0 (default in docker-compose.yml).
#
# Dokploy / Traefik (dev stack with Vite):
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up -d --build
# Or set in Dokploy environment: VITE_BEHIND_HTTPS_PROXY=1
services:
  frontend:
    environment:
      VITE_BEHIND_HTTPS_PROXY: "1"
      VITE_HMR_PROTOCOL: wss
      VITE_HMR_CLIENT_PORT: "443"
