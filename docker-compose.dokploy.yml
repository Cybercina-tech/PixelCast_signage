# =============================================================================
# Dokploy / production on the server — USE THIS FILE in the Dokploy UI.
# Compose path: docker-compose.dokploy.yml
#
# Prefer this over docker-compose.yml (Vite dev). Production = Nginx + built Vue + Gunicorn.
# Env: committed `.env.example` is loaded first (required), then optional `.env`.
# Set DB_NAME / DB_USER / DB_PASSWORD in Dokploy UI or `.env` (defaults match .env.example).
# If Postgres was already initialized with a different password, reset the `postgres_data` volume or reuse that password.
#
# Database troubleshooting (Dokploy):
# - Set DB_NAME, DB_USER, DB_PASSWORD consistently (same values for `db` + `backend`).
# - If you changed DB_NAME after the Postgres volume was first created, redeploy with the same
#   name or wipe the `postgres_data` volume once (data loss) so init runs again.
# - Backend entrypoint runs ensure_postgres_db.py to CREATE DATABASE if the app DB is missing.
# - The `db` healthcheck targets DB `postgres` so the stack does not deadlock when the app DB
#   must be created after Postgres is up.
#
# If you must run the Vite dev stack behind https:// (Traefik), use docker-compose.yml +
# docker-compose.https.yml and set VITE_BEHIND_HTTPS_PROXY=1 (see .env.example).
# =============================================================================
include:
  - path: docker-compose.prod.yml
